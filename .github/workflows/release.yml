name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to attach assets to
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target_name }}
    runs-on: ${{ matrix.runner }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: windows-x86_64
            target_triple: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
          - target_name: windows-aarch64
            target_triple: aarch64-pc-windows-msvc
            runner: windows-latest
            archive: zip
          - target_name: linux-x86_64
            target_triple: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target_name: linux-aarch64
            target_triple: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target_name: macos-x86_64
            target_triple: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target_name: macos-aarch64
            target_triple: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Normalize release version
        id: release_version
        shell: bash
        run: |
          TAG="${RELEASE_TAG}"
          if [[ "$TAG" =~ ^[vV]([0-9].*)$ ]]; then
            TAG="${BASH_REMATCH[1]}"
          fi
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Patch Cargo.toml version
        shell: bash
        run: |
          VERSION="${{ steps.release_version.outputs.version }}"
          if [[ -z "$VERSION" ]]; then
            echo "::error::Release version is empty"; exit 1
          fi
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          rm -f Cargo.toml.bak
          echo "Cargo.toml version is now:"
          grep '^version = ' Cargo.toml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target_triple }}

      - name: Sync Cargo.lock to patched version
        shell: bash
        run: cargo update -p winfolsize --precise "${{ steps.release_version.outputs.version }}"

      - name: Install Linux GUI deps
        if: startsWith(matrix.target_name, 'linux-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: Install aarch64 cross toolchain (linux)
        if: matrix.target_name == 'linux-aarch64'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target_triple }}

      - name: Verify binary version matches tag
        shell: bash
        run: |
          VERSION="${{ steps.release_version.outputs.version }}"
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            # On Windows test the console-subsystem twin; the GUI exe doesn't
            # reliably pipe stdout to a shell capture.
            BIN="target/${{ matrix.target_triple }}/release/winfolsizec.exe"
          else
            BIN="target/${{ matrix.target_triple }}/release/winfolsize"
          fi
          # Skip runtime check for cross-compiled aarch64 linux (can't exec on x86_64 host)
          if [[ "${{ matrix.target_name }}" == "linux-aarch64" ]]; then
            echo "Skipping --version exec for cross-compiled $BIN"
            exit 0
          fi
          OUT="$("$BIN" --version)"
          echo "binary reports: $OUT"
          if [[ "$OUT" != *"$VERSION"* ]]; then
            echo "::error::binary version output '$OUT' does not contain expected '$VERSION'"
            exit 1
          fi

      - name: Package release
        shell: bash
        run: |
          VERSION="${{ steps.release_version.outputs.version }}"
          ASSET_NAME="winfolsize-${VERSION}-${{ matrix.target_name }}"
          mkdir -p dist
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            cp "target/${{ matrix.target_triple }}/release/winfolsize.exe" dist/
            cp "target/${{ matrix.target_triple }}/release/winfolsizec.exe" dist/
          else
            cp "target/${{ matrix.target_triple }}/release/winfolsize" dist/
          fi
          cp LICENSE dist/
          cp README.md dist/
          cd dist
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            7z a "../${ASSET_NAME}.zip" *
          else
            tar -czf "../${ASSET_NAME}.tar.gz" *
          fi
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target_name }}
          path: |
            *.zip
            *.tar.gz
          if-no-files-found: error

  publish:
    name: Attach release assets
    runs-on: ubuntu-latest
    needs: [build]
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Attach assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/*.zip
            dist/*.tar.gz
            dist/SHA256SUMS.txt
          fail_on_unmatched_files: true
