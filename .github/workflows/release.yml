name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to attach assets to
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target_name }}
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: windows-x86_64
            target_triple: x86_64-pc-windows-msvc
          - target_name: windows-aarch64
            target_triple: aarch64-pc-windows-msvc

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Normalize release version
        id: release_version
        shell: bash
        run: |
          TAG="${RELEASE_TAG}"
          # Strip leading 'v' or 'V'
          if [[ "$TAG" =~ ^[vV]([0-9].*)$ ]]; then
            TAG="${BASH_REMATCH[1]}"
          fi
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Patch Cargo.toml version
        shell: bash
        run: |
          VERSION="${{ steps.release_version.outputs.version }}"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target_triple }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target_triple }}

      - name: Package release
        shell: bash
        run: |
          VERSION="${{ steps.release_version.outputs.version }}"
          ASSET_NAME="winfolsize-${VERSION}-${{ matrix.target_name }}"
          mkdir -p dist
          cp "target/${{ matrix.target_triple }}/release/winfolsize.exe" dist/
          cp LICENSE dist/
          cp README.md dist/
          cd dist
          7z a "../${ASSET_NAME}.zip" *
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target_name }}
          path: "*.zip"
          if-no-files-found: error

  publish:
    name: Attach release assets
    runs-on: ubuntu-latest
    needs: [build]
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum *.zip > SHA256SUMS.txt

      - name: Attach assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/*.zip
            dist/SHA256SUMS.txt
          fail_on_unmatched_files: true
