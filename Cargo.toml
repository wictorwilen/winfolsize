[package]
name = "winfolsize"
version = "0.1.0"
edition = "2024"
description = "A Windows disk space visualizer with treemap and sunburst views"
license = "MIT"
authors = ["Wictor Wilén <https://www.wictorwilen.se>"]
repository = "https://github.com/nicolexy/winfolsize"

[dependencies]
eframe = "0.31"
rfd = "0.15"
humansize = "2"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = ["Win32_Storage_FileSystem"] }

[profile.release]
opt-level = 3
lto = true
strip = true
